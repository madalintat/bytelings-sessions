name: Release

# Triggers on either:
#   - pushing a `v*` tag (auto end-to-end: build → create Release → publish)
#   - publishing a Release manually in the UI (build → publish)
#   - workflow_dispatch (escape hatch)
on:
  push:
    tags: ["v*"]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build release distributions
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: release-dists
          path: dist/

  # Only when triggered by a tag push: create the GitHub Release object and
  # attach the wheel + sdist. Skipped when the trigger is `release: published`,
  # because the Release already exists in that path.
  github-release:
    runs-on: ubuntu-latest
    needs: [release-build]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Retrieve release distributions
        uses: actions/download-artifact@v4
        with:
          name: release-dists
          path: dist/
      - name: Create GitHub Release with notes + binaries
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG" \
            --repo "${{ github.repository }}" \
            --title "$TAG" \
            --generate-notes \
            dist/*

  # Trigger path 2: someone manually published a Release. Attach the artifacts.
  attach-to-existing-release:
    runs-on: ubuntu-latest
    needs: [release-build]
    if: github.event_name == 'release'
    permissions:
      contents: write
    steps:
      - name: Retrieve release distributions
        uses: actions/download-artifact@v4
        with:
          name: release-dists
          path: dist/
      - name: Upload wheel + sdist to the existing Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" dist/* --repo "${{ github.repository }}" --clobber

  pypi-publish:
    runs-on: ubuntu-latest
    needs: [release-build]
    permissions:
      # Required for PyPI Trusted Publishing (OIDC token exchange).
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/project/bytelings/
    steps:
      - name: Retrieve release distributions
        uses: actions/download-artifact@v4
        with:
          name: release-dists
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
